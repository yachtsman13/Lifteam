{% extends 'core/base.html' %}

{% block title %}Удаление заказчика — LiftTeam v2.2{% endblock %}

{% block content %}
<div class="card border-danger">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Подтверждение удаления</h5>
    </div>
    <div class="card-body">
        <p>Вы действительно хотите удалить заказчика <strong>{{ client.name }}</strong>?</p>
        <p class="text-muted">Это действие нельзя отменить.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-2"></i>Удалить</button>
            <a href="{% url 'client_list' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
