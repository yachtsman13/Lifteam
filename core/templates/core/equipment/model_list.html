{% extends 'core/base.html' %}

{% block title %}Модели оборудования — LiftTeam v2.2{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-list me-2"></i>Модели оборудования</h2>
    <a href="{% url 'equipment_model_create' %}" class="btn btn-primary"><i class="bi bi-plus-lg me-2"></i>Новая модель</a>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr><th>Название</th></tr>
                </thead>
                <tbody>
                    {% for model in models %}
                    <tr><td>{{ model.name }}</td></tr>
                    {% empty %}
                    <tr><td class="text-center text-muted py-4">Модели не найдены</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
