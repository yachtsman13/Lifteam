{% extends 'core/base.html' %}

{% block title %}Новая модель — LiftTeam v2.2{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-list me-2"></i>Новая модель оборудования</h2>
    <a href="{% url 'equipment_model_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>Назад</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">{{ form.name.label }}</label>
                {{ form.name }}
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>Сохранить</button>
            <a href="{% url 'equipment_model_list' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
