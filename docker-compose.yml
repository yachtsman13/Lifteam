name: lifteam

services:
  db:
    image: postgres:15-alpine
    container_name: lifteam_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifteam
      POSTGRES_USER: lifteam
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lifteam_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    command: postgres -c shared_buffers=128MB -c effective_cache_size=256MB -c maintenance_work_mem=64MB -c max_connections=20 -c wal_buffers=4MB -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifteam -d lifteam"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lifteam_net

  redis:
    image: redis:7-alpine
    container_name: lifteam_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lifteam_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifteam_web
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=lifteam.settings_production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://lifteam:${DB_PASSWORD:-lifteam_secret}@db:5432/lifteam
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.yandex.ru}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    volumes:
      - media_files:/app/media
      - staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lifteam_net

  nginx:
    image: nginx:alpine
    container_name: lifteam_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    networks:
      - lifteam_net

volumes:
  postgres_data:
  redis_data:
  media_files:
  staticfiles:

networks:
  lifteam_net:
    driver: bridge
